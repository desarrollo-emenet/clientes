<header class="bg-white shadow-sm">
  <div class="container-fluid d-flex align-items-center justify-content-between py-2">

    <div class="d-flex align-items-center">
      <div class="d-flex me-3" href="#">
        <img src="assets/img/logo.png" alt="Logo" height="40">
      </div>
      <h5 class="mb-0 fw-bold text-dark">Comunicaciones</h5>
    </div>

    <div class="header-nav d-none d-md-flex" *ngIf="showNavButtons">
      <app-nav></app-nav>
    </div>

    <div class="header-actions d-flex align-items-center">
      <button class="notif-btn" type="button" (click)="toggleNotificaciones()" aria-label="Notificaciones">
        <i class="fa-regular fa-bell"></i>
      </button>

      <div class="notif-panel" *ngIf="isNotifOpen" (click)="$event.stopPropagation()">
        <div class="notif-panel-header">
          <div class="notif-panel-title">Notificaciones</div>
        </div>

        <div *ngIf="notifications.length === 0" class="notif-empty">
          <i class="fa-regular fa-bell"></i>
          <div class="notif-empty-text">No hay notificaciones</div>
        </div>

        <div class="notif-list" *ngIf="notifications.length > 0">
          <div
            *ngFor="let n of notifications"
            class="notif-item"
            [ngClass]="{ 'unread': n.unread, 'warning': n.title === 'Adeudo pendiente' }"
          >
            <div class="notif-icon">
              <i class="fa-regular fa-credit-card" style="color: rgb(0, 51, 143);"></i>
            </div>
            <div class="notif-content">
              <div class="notif-title">{{ n.title }}</div>
              <div class="notif-text">{{ n.text }}</div>
              <div class="notif-time">{{ n.time }}</div>
            </div>
          </div>
        </div>
      </div>

      <app-user-menu></app-user-menu>
    </div>

  </div>
</header>
