<!--Dropdown User Menu version max -->
<div class="user-menu-container">
  <button 
    class="user-dropdown-trigger d-flex align-items-center gap-2 px-3 py-2 rounded-3 bg-light border border-secondary-subtle"
    (click)="toggleDropdown()"
    [attr.aria-expanded]="isDropdownOpen"
    aria-haspopup="true"
  >
    <div class="avatar-container">
      <img 
        *ngIf="avatarUrl"
        [src]="avatarUrl" 
        [alt]="user?.name || 'Cliente'"
        class="rounded-circle"
        width="32"
        height="32"
      >
      <div 
        *ngIf="!avatarUrl"
        class="avatar-placeholder rounded-circle d-flex align-items-center justify-content-center bg-secondary text-white"
        style="width: 32px; height: 32px;"
      >
        {{ getInitials() }}
      </div>
    </div>
    <div class="user-info d-none d-sm-block text-start">
      <div class="fw-bold text-dark small mb-0 text-wrap">{{ user?.nombre || user?.name || user?.username || 'Cliente' }}</div>
      <div class="text-muted small mb-0">{{ user?.numeroCliente ? 'Cliente: ' + user?.numeroCliente : (user?.email || 'No. Cliente') }}</div>
    </div>
    <i class="bi bi-chevron-down d-none d-sm-block" [class.rotate-icon]="isDropdownOpen"></i>
  </button>

  <div 
    class="user-dropdown dropdown-menu shadow" 
    [class.show]="isDropdownOpen"
    (click)="$event.stopPropagation()"
  >
    <div class="dropdown-header d-flex align-items-center gap-3 p-3">
      <div class="avatar-large">
        <img 
          *ngIf="avatarUrl"
          [src]="avatarUrl" 
          [alt]="user?.name || 'Cliente'"
          class="rounded-circle"
          width="48"
          height="48"
        >
        <div 
          *ngIf="!avatarUrl"
          class="avatar-placeholder-large rounded-circle d-flex align-items-center justify-content-center bg-secondary text-white"
          style="width: 48px; height: 48px;"
        >
          {{ getInitials() }}
        </div>
      </div>
      <div class="flex-grow-1">
        <div class="fw-bold text-dark text-wrap">{{ user?.nombre || user?.name || user?.username || 'Cliente' }}</div>
        <div class="text-muted small">{{ user?.numeroCliente ? 'Cliente: ' + user?.numeroCliente : (user?.email || 'No. Cliente') }}</div>
        <div *ngIf="isAdmin()" class="d-flex align-items-center gap-1 mt-1">
          <i class="bi bi-star-fill text-warning"></i>
          <span class="small text-warning fw-medium">Admin</span>
        </div>
      </div>
    </div>

    <hr class="dropdown-divider my-0">

    <div class="dropdown-items py-1" *ngIf="!isServiceRoute">
      <button class="dropdown-item d-flex align-items-center gap-3" (click)="navigateTo('/perfil')">
        <i class="fa-regular fa-user"></i>
        <span>Perfil</span>
      </button>
      <button class="dropdown-item d-flex align-items-center gap-3" (click)="navigateTo('/notificaciones')">
        <i class="fa-regular fa-bell"></i>
        <span>Notificaciones</span>
      </button>
      <button class="dropdown-item d-flex align-items-center gap-3" (click)="navigateTo('/formas-de-pago')">
        <i class="fa-solid fa-hand-holding-dollar"></i>
        <span>Formas de pago</span>
      </button>
      <button class="dropdown-item d-flex align-items-center gap-3" (click)="navigateTo('/visitas')">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <span>Visitas</span>
      </button>
      <hr class="dropdown-divider my-1">
      <button class="dropdown-item d-flex align-items-center gap-3" (click)="navigateTo('/#')">
        <i class="fa-solid fa-headset"></i>
        <span>Soporte</span>
      </button>
    </div>

    <!--<hr class="dropdown-divider my-0">
    <div class="theme-toggle py-1">
      <button class="dropdown-item d-flex align-items-center gap-3" (click)="toggleTheme()">
        <i [class]="'bi ' + (theme === 'dark' ? 'bi-sun' : 'bi-moon')"></i>
        <span>{{ theme === 'dark' ? 'Modo claro' : 'Modo oscuro' }}</span>
      </button>
    </div>
   -->

    <hr class="dropdown-divider my-0">

    <div class="logout-section py-1">
      <button class="dropdown-item d-flex align-items-center gap-3 text-danger" (click)="handleLogout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </div>
</div>
