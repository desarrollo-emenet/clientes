<div class="sidebar">

  <nav class="list-group list-group-flush">

    <button routerLink="/dashboard" routerLinkActive="active"
      class="list-group-item list-group-item-action" title="Inicio"
      (click)="goDashboard()">
      <i class="fa-solid fa-house"></i>
      <span class="nav-label">Inicio</span>
    </button>

    <button routerLink="/estadoCuenta" routerLinkActive="active"
      class="list-group-item list-group-item-action" title="Estado de cuenta"
      (click)="goEstadoCuenta()">
      <i class="fi fi-bs-file-invoice-dollar"></i>
      <span class="nav-label">Estado de cuenta</span>
    </button>

 
     <button routerLink="/faq" routerLinkActive="active"
      class="list-group-item list-group-item-action" title="Preguntas frecuentes">
      <i class="fa-solid fa-headset"></i>
      <span class="nav-label">Soporte</span>
    </button>

  </nav>

</div>
