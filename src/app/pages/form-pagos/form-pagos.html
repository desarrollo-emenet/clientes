<div class="container-fluid">
  <main class="page">
    <div class="payment-container">
      <!-- HEADER -->
      <div class="payment-header">
        <div class="header-icon"><i class="fa-solid fa-receipt"></i></div>
        <div class="header-content">
          <h2>¡Registre su pago!</h2>
          <p>Por favor llene los siguientes campos para continuar</p>
        </div>
      </div>

      <!-- FORM -->
      <form [formGroup]="pagosForm" (ngSubmit)="enviarPago()">
        <div class="form-layout">
          <div class="form-card">
            <div class="card-title">
              <div class="card-icon blue"><i class="fa-solid fa-person"></i></div>
              <h5>Datos del cliente</h5>
            </div>
            <div class="card-grid">

              <!-- cliente -->
              <div class="field">
                <label>Número de cliente</label>
                <input type="text" formControlName="cliente" class="form-control custom-input" placeholder="#####">
              </div>

              <!-- nombre -->
              <div class="field">
                <label>Nombre del titular</label>
                <input type="text" formControlName="usuario" class="form-control custom-input"
                  placeholder="Nombre completo">
              </div>

              <!-- telefono -->
              <div class="field">
                <label>Teléfono</label>
                <input type="text" formControlName="telefono" class="form-control custom-input"
                  placeholder="Número de teléfono">
              </div>

              <!-- clave -->
              <div class="field">
                <label>Clave de pago</label>
                <input type="text" formControlName="clave" class="form-control custom-input"
                  placeholder="Clave de pago">
              </div>

            </div>

          </div>


          <div class="form-card">
            <div class="card-title">
              <div class="card-icon green"><i class="fa-solid fa-credit-card"></i></div>
              <h5>Información del pago</h5>
            </div>

            <div class="card-grid">
              <!-- fecha -->
              <div class="field">
                <label>Fecha de pago</label>
                <mat-form-field appearance="outline" class="custom-date-field">
                  <input matInput [matDatepicker]="picker" formControlName="fechaPago"
                    placeholder="Selecciona una fecha">
                  <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                  <mat-datepicker #picker></mat-datepicker>
                </mat-form-field>
              </div>

              <!-- operacion -->
              <div class="field">
                <label>Número de operación</label>
                <input type="text" formControlName="numOperacion" class="form-control custom-input"
                  placeholder="Número de operación">
              </div>

              <!-- mensualidad -->
              <div class="field">
                <label>Mensualidad</label>
                <input type="text" formControlName="mensualidad" class="form-control custom-input"
                  placeholder="Mensualidad">
              </div>

              <!-- monto -->
              <div class="field">
                <label>Monto a pagar</label>
                <input type="text" formControlName="monto" class="form-control custom-input"
                  placeholder="Monto a pagar">
              </div>

            </div>

          </div>

        </div>

        <div class="upload-card">
          <div class="card-title">
            <div class="card-icon purple"><i class="fa-solid fa-file-import"></i></div>
            <h5>Comprobante de pago</h5>
          </div>
          <div class="upload-zone">
            <div class="upload-center">
              <div class="upload-big-icon">
                <div class="upload-big-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
              </div>
              <h6>Sube tu comprobante aquí</h6>
              <input type="file" (change)="onFileChange($event)" formControlName="comprobante"
                class="form-control upload-input">
              <small>
                Formatos permitidos: JPG, PNG, PDF · Máx. 5MB
              </small>
            </div>
          </div>
        </div>

        <!-- BOTON -->
        <div class="submit-wrapper">
          <button type="submit" class="submit-btn" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2">
            </span>
            {{ loading ? 'ENVIANDO...' : 'ENVIAR DATOS' }}
          </button>
        </div>

      </form>

    </div>
    <ngx-sonner-toaster richColors position="top-center" />
  </main>

</div>
