<div class="login-layout flip-in">

    <!-- Logo -->
    <div class="text-center mb-4 mt-n4">
        <img src="assets/img/emenetLogo.png" alt="Emenet Logo" height="70">
    </div>

    <div class="auth-card shadow-lg p-4 p-sm-5">

        <h3 class="text-center fw-bold mb-1">Actualiza tu contraseña</h3>
        <p class="text-center text-muted mb-4">
            Por seguridad, confirma tu contraseña actual
        </p>

        <form [formGroup]="updateForm" (ngSubmit)="update()">

            <!-- Contraseña actual -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña actual</label>

                <div class="input-glow-wrapper">
                    <div class="input-group">
                        <input [type]="showOldPassword ? 'text' : 'password'" formControlName="old_password"
                            class="form-control" placeholder="Ingresa tu contraseña actual" />

                        <button type="button" class="btn-eye-toggle" [class.revealed]="showOldPassword"
                            (click)="viewOldPassword()">

                            <div class="eye-icon-wrap">
                                <img [src]="showOldPassword ? 'assets/img/invisible.png' : 'assets/img/ojo.png'"
                                    width="20">
                            </div>
                        </button>
                    </div>
                </div>

                <div *ngIf="old_password.invalid && (old_password.touched || old_password.dirty)"
                    class="mt-2 small text-danger">
                    Requerida.
                </div>
            </div>

            <!-- Nueva contraseña -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Nueva contraseña</label>

                <div class="input-glow-wrapper">
                    <div class="input-group">
                        <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                            class="form-control" placeholder="Mínimo 8 caracteres" />

                        <button type="button" class="btn-eye-toggle" [class.revealed]="showPassword"
                            (click)="viewPassword()">

                            <div class="eye-icon-wrap">
                                <img [src]="showPassword ? 'assets/img/invisible.png' : 'assets/img/ojo.png'"
                                    width="20">
                            </div>
                        </button>
                    </div>
                </div>

                <div *ngIf="password.invalid && (password.touched || password.dirty)" class="mt-2 small text-danger">
                    <div *ngIf="password.errors?.['required']">Requerida.</div>
                    <div *ngIf="password.errors?.['minlength']">Mínimo 8 caracteres.</div>
                </div>

                <!-- Strength -->
                <div class="strength-meter mt-3" *ngIf="password.value">
                    <div class="strength-bar-container">
                        <div class="strength-bar" [ngClass]="strengthColor" [style.width.%]="passwordStrength * 25">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-1">
                        <span class="strength-text" [ngClass]="strengthColor">
                            {{ strengthText }}
                        </span>
                        <span class="strength-feedback" *ngIf="passwordStrength < 3">
                            Usa símbolos y números
                        </span>
                    </div>
                </div>
            </div>

            <!-- Confirmar -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Confirmar contraseña</label>

                <div class="input-glow-wrapper">
                    <input type="password" formControlName="password_confirmation" class="form-control"
                        placeholder="Repite la contraseña" />
                </div>

                <div class="mt-2 small text-danger" *ngIf="updateForm.hasError('passwordMissMatch') &&
                 (passwordConfirmation.touched || updateForm.touched)">
                    Las contraseñas no coinciden.
                </div>
            </div>

            <!-- Tips -->
            <div class="form-text mb-4">
                <small class="text-muted">
                    <strong>Recomendaciones:</strong><br>
                    • Evita palabras comunes<br>
                    • Usa números y símbolos
                </small>
            </div>

            <!-- Acciones -->
            <div class="d-flex flex-column gap-3 align-items-center mt-2">

                <div class="btn-water-wrapper">
                    <button type="submit" class="btn-water" [disabled]="loading" [class.loading]="loading">

                        <span class="water-fill"></span>

                        <span class="btn-water-content">
                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                            {{ loading ? 'GUARDANDO...' : 'GUARDAR CAMBIOS' }}
                        </span>
                    </button>
                </div>

                <a (click)="cancel()" class="link-subtle">
                    Cancelar y regresar
                </a>

            </div>

        </form>

        <ngx-sonner-toaster richColors position="top-center" />
    </div>
</div>
