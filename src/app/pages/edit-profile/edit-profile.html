<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-lg p-2 p-sm-3">
                <div class="card-body">
                    <h4 class="mb-3">Editar perfil</h4>

                    <form [formGroup]="updateForm" (ngSubmit)="update()">

                        <!-- Contraseña actual-->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña actual</label>
                            <div class="input-group">
                                <input [type]="showPassword ? 'text' : 'password'" formControlName="old_password"
                                    class="form-control" placeholder="Contraseña actual" />

                                <button type="button" class="btn btn-outline-secondary" (click)="viewPassword()">
                                    <img [src]="showPassword ? 'assets/img/invisible.png' : 'assets/img/ojo.png'" alt=""
                                        width="24" height="24">
                                </button>

                                <div *ngIf="password.invalid && (password.dirty || password.touched)"
                                    class="mt-2 small text-danger">
                                    <div *ngIf="password.errors?.['required']">La contraseña es requerida.</div>
                                </div>

                            </div>
                        </div>

                        <!-- Contraseña nueva -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña nueva</label>
                            <div class="input-group">
                                <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                                    class="form-control" placeholder="Nueva contraseña (mín 8 caracteres)" />

                                <button type="button" class="btn btn-outline-secondary" (click)="viewPassword()">
                                    <img [src]="showPassword ? 'assets/img/invisible.png' : 'assets/img/ojo.png'" alt=""
                                        width="24" height="24">
                                </button>

                                <div *ngIf="password.invalid && (password.dirty || password.touched)"
                                    class="mt-2 small text-danger">
                                    <div *ngIf="password.errors?.['minlength']">La contraseña debe tener al menos 8
                                        caracteres.</div>
                                    <div *ngIf="password.errors?.['required']">La contraseña es requerida.</div>
                                </div>
                            </div>
                        </div>

                        <!-- Confirmar contraseña -->
                        <div class="mb-3">
                            <label class="form-label">Confirmar Contraseña</label>
                            <input type="password" formControlName="password_confirmation" class="form-control"
                                placeholder="Confirma la contraseña" />
                            <div class="invalid-feedback d-block"
                                *ngIf="(passwordConfirmation.touched || updateForm.touched) && updateForm.hasError('passwordMissMatch')">
                                Las contraseñas no coinciden.
                            </div>
                            <div class="invalid-feedback d-block"
                                *ngIf="passwordConfirmation.touched && passwordConfirmation.errors?.['required']">
                                La contraseña es requerida.
                            </div>


                        </div>

                        <!-- Acciones -->
                        <div class="d-flex gap-2 justify-content-end mt-4">
                            <button type="button" class="btn btn-outline-secondary" (click)="cancel()"
                                [disabled]="loading">Cancelar</button>
                            <button type="submit" class="btn btn-primary" [disabled]="loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                                Guardar cambios
                            </button>
                        </div>
                    </form>
                </div>
                <ngx-sonner-toaster richColors position="top-center" />
            </div>
        </div>
    </div>
</div>
