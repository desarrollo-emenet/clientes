<div class="login-layout flip-in" [class.flip-out]="isFlipping">
  <!-- Logo -->
  <div class="text-center mb-4 mt-n4">
    <img src="assets/img/emenetLogo.png" alt="Emenet Logo" height="70">
  </div>

  <!-- Contenedor con estilo ep-container -->
  <div class="ep-container">

    <!-- ENCABEZADO -->
    <div class="ep-header">
      <div class="ep-header-icon">
        <i class="fa-solid fa-key"></i>
      </div>
      <div class="ep-header-content">
        <h2>Recuperar contraseña</h2>
        <p>Ingresa tu correo para buscar tu cuenta</p>
      </div>
    </div>

    <!-- FORMULARIO -->
    <form [formGroup]="recoverForm" (ngSubmit)="recover()">

      <div class="ep-card">
        <div class="ep-card-title">
          <div class="ep-card-icon blue">
            <i class="fa-solid fa-envelope"></i>
          </div>
          <h5>Correo electrónico</h5>
        </div>

        <div class="ep-card-grid">

          <!-- Campo: Correo electrónico -->
          <div class="ep-field">
            <label for="exampleInputEmail1">Correo electrónico</label>
            <input formControlName="email" type="email" class="ep-input"
              id="exampleInputEmail1" placeholder="correo@dominio.com"
              aria-describedby="emailHelp" />
            
            <div *ngIf="email.invalid && (email.dirty || email.touched)"
              class="ep-error">
              <span *ngIf="email.errors?.['required']">Email requerido</span>
              <span *ngIf="email.errors?.['email']">
                Email debe tener formato válido
              </span>
            </div>
          </div>

        </div>
      </div>

      <!-- Enlaces: Regresar -->
      <div class="ep-links-row">
        <a (click)="goToUrl('/iniciar-sesion')" class="ep-link"
          style="cursor: pointer;">
          Regresar a inicio de sesión
        </a>
      </div>

      <!-- Mensaje de error global -->
      <div *ngIf="error" class="alert alert-danger text-center error-global">
        {{ error }}
      </div>

      <!-- Botón Recuperar -->
      <div class="ep-actions">
        <button type="submit" class="ep-submit-btn" [disabled]="loading">
          <span *ngIf="loading"
            class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'RECUPERANDO...' : 'RECUPERAR' }}
        </button>
      </div>

    </form>
    <ngx-sonner-toaster richColors closeButton position="top-center" />
  </div>
</div>
