<div class="login-layout flip-in" [class.flip-out]="isFlipping">
  <!-- Logo -->
  <div class="text-center mb-4 mt-n4">
    <img src="assets/img/emenetLogo.webp" alt="Emenet Logo" height="70">
  </div>

  <div class="ep-container">
    <div class="ep-header">
      <div class="ep-header-icon">
        <i class="fa-solid fa-key"></i>
      </div>
      <div class="ep-header-content">
        <h2>Nueva contraseña</h2>
        <p>Ingresa tu nueva contraseña</p>
      </div>
    </div>

    <form [formGroup]="recoverForm" (ngSubmit)="recoverPassword()">
      <div class="ep-card">
        <div class="ep-card-title">
          <div class="ep-card-icon blue">
            <i class="fa-solid fa-lock"></i>
          </div>
          <h5>Seguridad de cuenta</h5>
        </div>
        <div class="ep-card-grid">

          <div class="ep-field">
            <label>Nueva Contraseña</label>
            <div class="ep-input-group" style="position: relative; display: flex;">
              <input [type]="showPassword ? 'text' : 'password'" formControlName="password" class="ep-input"
                placeholder="Nueva contraseña (mín 8 caracteres)" style="padding-right: 50px;" />
              <button type="button" class="btn-eye-toggle-ep" [class.revealed]="showPassword" (click)="viewPassword()"
                title="Mostrar/ocultar contraseña"
                style="position: absolute; right: 4px; top: 4px; bottom: 4px; border: none; background: transparent; cursor: pointer; width: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px;">
                <div class="eye-icon-wrap">
                  <img [src]="showPassword ? 'assets/img/invisible.png' : 'assets/img/ojo.png'" alt="toggle" width="20"
                    height="20">
                </div>
              </button>
            </div>

            <div *ngIf="password.invalid && (password.dirty || password.touched)" class="ep-error">
              <span *ngIf="password.errors?.['minlength']">Mínimo 8 caracteres.</span>
              <span *ngIf="password.errors?.['required']">Requerida.</span>
            </div>

            <!-- Password Strength Meter -->
            <div class="strength-meter mt-3" *ngIf="password.value">
              <div class="strength-bar-container">
                <div class="strength-bar" [ngClass]="strengthColor" [style.width.%]="passwordStrength * 25"></div>
              </div>
              <div class="d-flex justify-content-between align-items-center mt-1">
                <span class="strength-text" [ngClass]="strengthColor">{{ strengthText }}</span>
                <span class="strength-feedback" *ngIf="passwordStrength < 3">Usa símbolos y números</span>
              </div>
            </div>
          </div>

          <div class="ep-field">
            <label>Confirmar Contraseña</label>
            <input type="password" formControlName="password_confirmation" class="ep-input"
              placeholder="Repite la contraseña" />
            <div class="ep-error"
              *ngIf="(passwordConfirmation.touched || recoverForm.touched) && recoverForm.hasError('passwordMissMatch')">
              <span>Las contraseñas no coinciden.</span>
            </div>
            <div class="ep-error" *ngIf="passwordConfirmation.touched && passwordConfirmation.errors?.['required']">
              <span>Requerida.</span>
            </div>
          </div>

          <div class="form-text mt-1">
            <small class="text-muted">
              <strong><i class="fa-solid fa-thumbs-up"></i> Recomendaciones:</strong><br>
              <i class="fa-solid fa-check"></i> Evita palabras obvias.<br>
              <i class="fa-solid fa-check"></i> Combina letras y caracteres especiales.
            </small>
          </div>

          <div class="ep-links-row mt-3">
            <a (click)="cancel()" class="ep-link" style="cursor: pointer;">
              Cancelar y regresar
            </a>
          </div>

        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger text-center error-global">
        {{ error }}
      </div>

      <div class="ep-actions">
        <button type="submit" class="ep-submit-btn" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'GUARDANDO...' : 'GUARDAR CAMBIOS' }}
        </button>
      </div>

    </form>
  </div>
</div>
<ngx-sonner-toaster richColors closeButton position="top-center" />
